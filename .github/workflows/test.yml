name: Tests

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main

env:
  PYTHON_VERSION: '3.14'
  COVERAGE_THRESHOLD: '70'
  PYTEST_ARGS: '-v --tb=short'
  COVERAGE_REPORT_DIR: 'htmlcov'
  ARTIFACT_RETENTION_DAYS: '30'

jobs:
  test:
    name: 运行测试
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 运行单元测试
        run: |
          python -m pytest tests/unit ${{ env.PYTEST_ARGS }}

      - name: 🔗 运行集成测试
        run: |
          python -m pytest tests/integration ${{ env.PYTEST_ARGS }}

      - name: 📊 运行测试覆盖率
        run: |
          python -m pytest tests/ --cov=app --cov-report=term --cov-report=html

      - name: 📈 上传覆盖率报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ${{ env.COVERAGE_REPORT_DIR }}/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

      - name: ✅ 测试总结
        if: always()
        run: |
          echo "## 测试结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 所有测试已完成" >> $GITHUB_STEP_SUMMARY

